<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CosmicTube - Smart Media Center</title>
    <style>
        :root {
            --bg-main: #0a0c10;
            --bg-sidebar: #121620;
            --bg-card: #181f30;
            --accent-color: #38bdf8;
            --accent-hover: #0ea5e9;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --sidebar-width: 240px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* --- SIDEBAR NAVIGATION (SmartTube Style) --- */
        .sidebar {
            width: var(--sidebar-width);
            background-color: var(--bg-sidebar);
            display: flex;
            flex-direction: column;
            padding: 20px 10px;
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            transition: width 0.3s ease;
        }

        .brand-logo {
            font-size: 20px;
            font-weight: 800;
            color: var(--accent-color);
            margin-bottom: 30px;
            padding-left: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            padding: 14px 15px;
            color: var(--text-muted);
            text-decoration: none;
            border-radius: 10px;
            margin-bottom: 5px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .nav-item:hover, .nav-item.active {
            background-color: rgba(56, 189, 248, 0.15);
            color: var(--text-main);
        }

        .nav-item.active {
            border-left: 4px solid var(--accent-color);
        }

        /* --- MAIN CONTENT CONTAINER --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            overflow-y: auto;
            padding: 30px;
        }

        /* Search Bar Header */
        .header-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .search-box {
            position: relative;
            width: 400px;
        }

        .search-box input {
            width: 100%;
            padding: 12px 20px;
            background-color: var(--bg-sidebar);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 30px;
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.3s;
        }

        .search-box input:focus {
            border-color: var(--accent-color);
        }

        /* --- THE ADVANCED VIDEO PLAYER STAGE --- */
        .player-stage {
            width: 100%;
            max-width: 900px;
            background-color: #000;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            display: none; /* Revealed when a video is loaded */
            position: relative;
        }

        .player-stage video {
            width: 100%;
            display: block;
        }

        /* Custom Smart Controls overlay */
        .player-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(transparent, rgba(0,0,0,0.9));
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .player-stage:hover .player-controls {
            opacity: 1;
        }

        .progress-bar-container {
            width: 100%;
            height: 6px;
            background: rgba(255,255,255,0.2);
            cursor: pointer;
            border-radius: 3px;
            position: relative;
        }

        .progress-filled {
            height: 100%;
            width: 0%;
            background-color: var(--accent-color);
            border-radius: 3px;
        }

        .control-buttons {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .left-controls, .right-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .ctrl-btn {
            background: none;
            border: none;
            color: white;
            cursor: pointer;
            font-weight: bold;
            font-size: 14px;
        }

        .ctrl-btn:hover {
            color: var(--accent-color);
        }

        /* --- MEDIA GRID SYSTEM --- */
        .section-title {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 20px;
            letter-spacing: -0.5px;
        }

        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
        }

        .video-card {
            background-color: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.2, 0.8, 0.2, 1);
            border: 1px solid rgba(255,255,255,0.02);
        }

        .video-card:hover {
            transform: scale(1.03);
            border-color: rgba(56, 189, 248, 0.3);
        }

        .thumbnail-wrapper {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: linear-gradient(45deg, #1e293b, #0f172a);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .video-duration {
            position: absolute;
            bottom: 8px;
            right: 8px;
            background-color: rgba(0,0,0,0.8);
            padding: 2px 6px;
            font-size: 11px;
            border-radius: 4px;
            font-weight: 600;
        }

        .card-details {
            padding: 15px;
        }

        .video-title {
            font-size: 14px;
            font-weight: 600;
            line-height: 1.4;
            margin-bottom: 6px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .video-meta {
            font-size: 12px;
            color: var(--text-muted);
        }

        /* --- BACKGROUND AUDIO POPUP (SmartTube Signature Feature) --- */
        .bg-audio-drawer {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background-color: var(--bg-sidebar);
            border: 2px solid var(--accent-color);
            border-radius: 12px;
            padding: 15px;
            display: none;
            align-items: center;
            gap: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            z-index: 100;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand-logo">📺 CosmicTube</div>
        <div class="nav-item active" onclick="switchTab('home')">🏠 Home Feed</div>
        <div class="nav-item" onclick="switchTab('trending')">🔥 Trending</div>
        <div class="nav-item" onclick="switchTab('music')">🎵 Music Stream</div>
        <div class="nav-item" onclick="switchTab('history')">⏳ History Log</div>
        <div class="nav-item" onclick="togglePIP()">📻 Keep Audio Node</div>
    </div>

    <div class="main-content">
        <div class="header-actions">
            <div class="search-box">
                <input type="text" id="videoSearch" placeholder="Search direct stream URLs or local tags..." oninput="filterMediaGrid()">
            </div>
            <div style="font-size: 14px; color: var(--text-muted);" id="streamStats">Engine Status: Ready</div>
        </div>

        <div class="player-stage" id="playerStage">
            <video id="mainVideoPlayer" src="" playsinline></video>
            <div class="player-controls">
                <div class="progress-bar-container" onclick="seekVideo(event)">
                    <div class="progress-filled" id="progressBar"></div>
                </div>
                <div class="control-buttons">
                    <div class="left-controls">
                        <button class="ctrl-btn" onclick="togglePlay()">Play/Pause</button>
                        <button class="ctrl-btn" onclick="adjustVolume(-0.1)">Vol -</button>
                        <button class="ctrl-btn" onclick="adjustVolume(0.1)">Vol +</button>
                        <span id="timeDisplay" style="font-size: 12px; font-family: monospace;">00:00 / 00:00</span>
                    </div>
                    <div class="right-controls">
                        <button class="ctrl-btn" onclick="changeSpeed(1)">1.0x</button>
                        <button class="ctrl-btn" onclick="changeSpeed(1.5)">1.5x</button>
                        <button class="ctrl-btn" onclick="changeSpeed(2)">2.0x</button>
                        <button class="ctrl-btn" style="color: #ef4444;" onclick="closeVideoPlayer()">Close</button>
                    </div>
                </div>
            </div>
        </div>

        <h3 class="section-title" id="gridTitle">Home Feed</h3>
        <div class="media-grid" id="mediaContainer">
            </div>
    </div>

    <div class="bg-audio-drawer" id="bgAudioWidget">
        <div>
            <div style="font-size: 13px; font-weight: bold;" id="bgWidgetTitle">Now playing behind pipeline...</div>
            <div style="font-size: 11px; color: var(--text-muted);">Background Audio Engine Active</div>
        </div>
        <button class="ctrl-btn" style="background: var(--accent-color); color: #000; padding: 6px 12px; border-radius: 6px;" onclick="maximizeAudioPlayer()">Maximize</button>
    </div>

    <script>
        // Media Catalog Database Array
        const mediaDatabase = [
            { id: 1, title: "Big Buck Bunny Open Source Movie", duration: "09:56", views: "1.4M views", category: "home", url: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4" },
            { id: 2, title: "Sintel Cinematic Blender Foundation Animation", duration: "14:48", views: "890K views", category: "trending", url: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/Sintel.mp4" },
            { id: 3, title: "Tears of Steel Sci-Fi VFX Trailer", duration: "12:14", views: "3.2M views", category: "home", url: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/TearsOfSteel.mp4" },
            { id: 4, title: "Elephant's Dream Experimental Soundscapes", duration: "10:53", views: "412K views", category: "music", url: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4" },
            { id: 5, title: "Subaru BRZ Commercial Concept Spec Run", duration: "01:00", views: "5.1M views", category: "trending", url: "https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4" }
        ];

        let currentActiveTab = "home";
        const videoPlayer = document.getElementById('mainVideoPlayer');
        const playerStage = document.getElementById('playerStage');
        const progressBar = document.getElementById('progressBar');
        const timeDisplay = document.getElementById('timeDisplay');

        // Render Media Grid cards on load
        function renderGrid(filterCategory = "home") {
            const container = document.getElementById('mediaContainer');
            container.innerHTML = "";
            
            const datasets = mediaDatabase.filter(item => item.category === filterCategory || filterCategory === "all");

            datasets.forEach(video => {
                const card = document.createElement('div');
                card.className = "video-card";
                card.onclick = () => launchVideoEngine(video.url, video.title);

                card.innerHTML = `
                    <div class="thumbnail-wrapper">
                        <span style="font-size: 32px;">🎬</span>
                        <div class="video-duration">${video.duration}</div>
                    </div>
                    <div class="card-details">
                        <div class="video-title">${video.title}</div>
                        <div class="video-meta">${video.views} • Streaming Source</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // Tab selection engine switching
        function switchTab(tabId) {
            currentActiveTab = tabId;
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
            
            document.getElementById('gridTitle').innerText = tabId.charAt(0).toUpperCase() + tabId.slice(1) + " Section";
            renderGrid(tabId === 'history' ? 'all' : tabId);
        }

        // Live filtration loop tool
        function filterMediaGrid() {
            const query = document.getElementById('videoSearch').value.toLowerCase();
            const cards = document.querySelectorAll('.video-card');
            
            cards.forEach((card, index) => {
                const targetData = mediaDatabase[index];
                if(targetData && targetData.title.toLowerCase().includes(query)) {
                    card.style.display = "block";
                } else {
                    card.style.display = "none";
                }
            });
        }

        // Launches Video Processing Pipeline
        function launchVideoEngine(streamUrl, title) {
            document.getElementById('bgAudioWidget').style.display = "none";
            playerStage.style.display = "block";
            videoPlayer.src = streamUrl;
            videoPlayer.play();
            
            document.getElementById('streamStats').innerText = `Playing: ${title.substring(0, 15)}...`;
            playerStage.scrollIntoView({ behavior: 'smooth' });
        }

        // Video Player Operations Core
        function togglePlay() {
            if (videoPlayer.paused) videoPlayer.play();
            else videoPlayer.pause();
        }

        function adjustVolume(amount) {
            videoPlayer.volume = Math.min(1, Math.max(0, videoPlayer.volume + amount));
        }

        function changeSpeed(rate) {
            videoPlayer.playbackRate = rate;
        }

        function closeVideoPlayer() {
            videoPlayer.pause();
            playerStage.style.display = "none";
            document.getElementById('streamStats').innerText = "Engine Status: Standby";
        }

        // Track running updates on progress bar timeline
        videoPlayer.addEventListener('timeupdate', () => {
            if(videoPlayer.duration) {
                const percentage = (videoPlayer.currentTime / videoPlayer.duration) * 100;
                progressBar.style.width = `${percentage}%`;
                
                // Format timestamp string
                let curMins = Math.floor(videoPlayer.currentTime / 60);
                let curSecs = Math.floor(videoPlayer.currentTime % 60);
                let durMins = Math.floor(videoPlayer.duration / 60);
                let durSecs = Math.floor(videoPlayer.duration % 60);

                if(curSecs < 10) curSecs = "0" + curSecs;
                if(durSecs < 10) durSecs = "0" + durSecs;

                timeDisplay.innerText = `${curMins}:${curSecs} / ${durMins}:${durSecs}`;
            }
        });

        function seekVideo(event) {
            const rect = event.currentTarget.getBoundingClientRect();
            const clickPositionX = event.clientX - rect.left;
            const widthValue = rect.width;
            const targetPercentage = clickPositionX / widthValue;
            
            if(videoPlayer.duration) {
                videoPlayer.currentTime = targetPercentage * videoPlayer.duration;
            }
        }

        // SmartTube Signature Feature: Minimize layout while streaming active background node
        function togglePIP() {
            if(!videoPlayer.paused && videoPlayer.src !== "") {
                playerStage.style.display = "none";
                document.getElementById('bgAudioWidget').style.display = "flex";
            }
        }

        function maximizeAudioPlayer() {
            document.getElementById('bgAudioWidget').style.display = "none";
            playerStage.style.display = "block";
        }

        // Initial launch configuration setup
        renderGrid("home");
    </script>
</body>
                </html>
